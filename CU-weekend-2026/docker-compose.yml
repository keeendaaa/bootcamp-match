services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
    volumes:
      - ./uploads:/app/uploads
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: cu_weekend
      POSTGRES_USER: cu_user
      POSTGRES_PASSWORD: cu_password
    ports:
      - "5432:5432"
    volumes:
      - cu_weekend_pg:/var/lib/postgresql/data

volumes:
  cu_weekend_pg:
